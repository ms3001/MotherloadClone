<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motherload Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="row"><span class="lbl">DEPTH</span><span id="hud-depth">0 m</span></div>
    <div class="row"><span class="lbl">FUEL</span><div class="bar"><div id="hud-fuel" class="fill fuel"></div></div></div>
    <div class="row"><span class="lbl">HULL</span><div class="bar"><div id="hud-hull" class="fill hull"></div></div></div>
    <div class="row"><span class="lbl">CARGO</span><span id="hud-cargo">0 / 0</span></div>
    <div class="row"><span class="lbl">VALUE</span><span id="hud-value">$0</span></div>
  </div>
  <div id="banner" class="hidden"></div>
  <div id="loading">Generating world&hellip;</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
