<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motherload Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="row"><span class="lbl">DEPTH</span><span id="hud-depth">0 m</span></div>
    <div class="row"><span class="lbl">FUEL</span><div class="bar"><div id="hud-fuel" class="fill fuel"></div><span id="hud-fuel-val" class="bar-val"></span></div></div>
    <div class="row"><span class="lbl">HULL</span><div class="bar"><div id="hud-hull" class="fill hull"></div><span id="hud-hull-val" class="bar-val"></span></div></div>
    <div class="row"><span class="lbl">CARGO</span><div class="bar"><div id="hud-cargo" class="fill cargo"></div><span id="hud-cargo-val" class="bar-val"></span></div></div>
    <div class="row"><span class="lbl">MONEY</span><div class="bar"><div id="hud-money" class="fill money"></div><span id="hud-money-val" class="bar-val"></span></div></div>

  </div>
  <div id="inventory" class="hidden">
    <div class="inv-header">INVENTORY <span class="inv-hint">[TAB]</span></div>
    <div class="inv-section-title">CARGO</div>
    <div id="inv-cargo-list"></div>
    <div id="inv-cargo-footer" class="inv-footer"></div>
    <div class="inv-section-title">DRILLER</div>
    <div id="inv-driller-list"></div>
    <div id="inv-reset-btn">
      <div id="inv-reset-progress"></div>
      <span id="inv-reset-label">HOLD TO RESET SAVE</span>
    </div>
  </div>
  <div id="banner" class="hidden"></div>
  <div id="loading">Generating world&hellip;</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
